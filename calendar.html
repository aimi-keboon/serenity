<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords"
        content="Pantai Cenang, Pantai Tengah, Tanjung Rhu Beach, Datai Bay Langkawi, Black Sand Beach Langkawi, Langkawi Sky Bridge, Langkawi Cable Car, Gunung Mat Cincang, Telaga Tujuh Waterfalls, Seven Wells waterfall Langkawi, Kilim Karst Geoforest Park, Langkawi mangrove tour, Langkawi waterfalls, Langkawi rainforest, Langkawi nature spots, Langkawi scenic views, Langkawi sunset spots">
    <title>Retreat Schedule | Langkawi Serenity</title>
    <link rel="icon" type="image/png" href="img/ls-logo.png">
    <link rel="apple-touch-icon" href="img/ls-logo.png">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <style>
        body {
            background-color: #f8faf9;
            padding-top: 100px;
        }

        .calendar-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .calendar-header h1 {
            font-family: 'Playfair Display', serif;
            color: #1b4332;
            font-size: 2.8rem;
        }

        .schedule-container {
            max-width: 1000px;
            margin: 0 auto 80px;
            padding: 0 20px;
        }

        /* Modern Schedule Cards */
        .date-strip {
            display: grid;
            grid-template-columns: 120px 1fr 180px;
            background: white;
            margin-bottom: 20px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            align-items: center;
        }

        .date-strip:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.07);
        }

        .date-block {
            background: #1b4332;
            color: white;
            text-align: center;
            padding: 25px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .date-block .month {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .date-block .day {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 5px 0;
        }

        .date-details {
            padding: 20px 40px;
        }

        .date-details h3 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 8px;
        }

        .status-pill {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .available .status-pill {
            background: #e7f3ef;
            color: #1b4332;
        }

        .limited .status-pill {
            background: #fff4e5;
            color: #d4a373;
        }

        .sold-out {
            opacity: 0.7;
            filter: grayscale(1);
        }

        .sold-out .status-pill {
            background: #eee;
            color: #777;
        }

        .date-action {
            padding: 20px;
            text-align: center;
            border-left: 1px dashed #eee;
        }

        .book-link {
            display: inline-block;
            background: #1b4332;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .book-link:hover {
            background: #d4a373;
        }

        .full-text {
            color: #999;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Add this inside your <style> tag */

        .invite-only .status-pill {
            background: #ffebee;
            /* Light red background */
            color: #8b0000;
            /* Dark red text */
            font-weight: 800;
            /* Extra Bold */
            border: 1px solid #8b0000;
        }

        /* Optional: If you want the "Select Date" button to look different for Invite-Only */
        .invite-only .book-link {
            background: #8b0000;
        }

        /* MOBILE NAV OVERRIDES */
        @media (max-width: 768px) {
            .date-strip {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .date-block {
                padding: 15px;
            }

            .date-action {
                border-left: none;
                border-top: 1px dashed #eee;
            }

            .date-details {
                padding: 20px;
            }

            /* Ensure nav links are hidden/shown correctly */
            .nav-links {
                position: absolute;
                top: 70px;
                right: -100%;
                width: 100%;
                background: white;
                flex-direction: column;
                padding: 40px 0;
                transition: 0.4s;
                display: flex;
                /* Override desktop hidden state */
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            }

            .nav-links.active {
                right: 0;
            }
        }
    </style>
</head>

<body>

    <nav id="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration:none; color:inherit;">LANGKAWI<span>SERENITY</span></a>
        </div>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <div class="calendar-header">
        <h1>Retreat Schedule</h1>
        <p>Each session is a curated 4-Day / 3-Night experience.</p>
    </div>

    <div class="schedule-container" id="schedule-list">
    </div>

    <script src="dates.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. POPULATE THE LIST ---
            const list = document.getElementById('schedule-list');

            // Check if retreatDates is defined in dates.js
            if (typeof retreatDates !== 'undefined') {
                retreatDates.forEach(date => {
                    const strip = document.createElement('div');
                    // Standardize status class (handles "Sold Out" vs "sold-out")
                    const statusClass = date.status.toLowerCase().replace(/\s+/g, '-');
                    strip.className = `date-strip ${statusClass}`;

                    strip.innerHTML = `
            <div class="date-block">
                <span class="month">${date.month}</span>
                <span class="day">${date.dayRange}</span>
            </div>
            <div class="date-details">
                <span class="status-pill">${date.status}</span>
                <h3>${date.year} ${date.month} Session</h3>
                <p style="font-size: 0.9rem; color: #4a7c66; font-weight: 500; margin-top: 6px; display: flex; align-items: center;">
                    
                    ${date.description || "Curated Wellness & Nature Experience"}
                </p>
            </div>
            <div class="date-action">
                ${date.status.toLowerCase() !== "sold out"
                            ? `<a href="register.html?date=${date.id}" class="book-link">Select Date</a>`
                            : `<span class="full-text">Fully Booked</span>`}
            </div>
        `;
                    list.appendChild(strip);
                });
            }

            // --- 2. MOBILE MENU LOGIC ---
            const menuToggle = document.getElementById('mobile-menu');
            const navLinks = document.querySelector('.nav-links');

            if (menuToggle) {
                menuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                    menuToggle.classList.toggle('is-active'); // For bar animation
                });
            }
        });
    </script>
    <script src="footer.js"></script>
</body>

</html>

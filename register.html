<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .hp-container {
            display: none !important;
            visibility: hidden;
            position: absolute;
            left: -9999px;
        }
    </style>
    <title>Registration | Langkawi Serenity Retreat</title>
    <link rel="icon" type="image/png" href="img/ls-logo.png">
    <link rel="apple-touch-icon" href="img/ls-logo.png">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        /* Registration Page Specific Overrides */
        body {
            background-color: #f4f7f6;
            padding-top: 100px;
            font-family: 'Montserrat', sans-serif;
        }

        .reg-container {
            max-width: 850px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .reg-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .reg-header h1 {
            font-family: 'Playfair Display', serif;
            color: #1b4332;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .form-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #d4a373;
            margin: 40px 0 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input,
        select,
        textarea {
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #1b4332;
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.1);
        }

        .policy-note {
            background-color: #f1f8f4;
            border-left: 4px solid #1b4332;
            padding: 20px;
            margin: 30px 0;
            border-radius: 0 8px 8px 0;
        }

        .policy-note p {
            font-size: 0.85rem;
            color: #1b4332;
            line-height: 1.6;
            margin: 0;
        }

        .submit-btn {
            width: 100%;
            background-color: #1b4332;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #d4a373;
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }

            .form-card {
                padding: 25px;
            }

            .reg-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <nav id="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration:none; color:inherit;">LANGKAWI<span>SERENITY</span></a>
        </div>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Back to Home</a></li>
            <li><a href="calendar.html">View Schedule</a></li>
        </ul>
    </nav>

    <div class="reg-container">
        <div class="reg-header">
            <h1>Begin Your Journey</h1>
            <p>4 Days & 3 Nights of tranquility at Telaga Tujuh.</p>
        </div>

        <div class="form-card">
            <form id="registrationForm">

                <div class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    Guest Details
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" name="fname" required placeholder="Enter first name">
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" name="lname" required placeholder="Enter last name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone / WhatsApp</label>
                        <input type="tel" id="phone" name="phone" required placeholder="+60 12-345 6789">
                    </div>
                </div>

                <div class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Package & Logistics
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="package">Select Retreat Package</label>
                        <select id="package" name="package" required>
                            <option value="" disabled selected>Choose a package...</option>
                            <option value="Solo Sanctuary">Solo Sanctuary (All-Inclusive) - RM 5,499</option>
                            <option value="Couple's Escape">Couple's Escape (All-Inclusive) - RM 9,899</option>
                            <option value="Group Tribe">Family & Tribe (3+ Pax) - RM 4,499/pax</option>
                            <option value="Activities Only">Activities Only (No Stay/Transport) - RM 2,199</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="kl-transport">Klang Valley Travel Support?</label>
                        <select id="kl-transport" name="kl-transport" required>
                            <option value="No">No, I will manage my own travel to Langkawi</option>
                            <option value="Yes">Yes, I want the KL/Selangor Return Service</option>
                        </select>
                        <p style="font-size: 0.75rem; color: #666; margin-top: 5px; line-height: 1.4;">
                            *Return Transport + Flights. Add <strong>RM 800/pax</strong>. <br>
                            Group discount: <strong>RM 750/pax</strong> (2+ people).
                        </p>
                    </div>

                    <div class="form-group">
                        <label for="retreat-date">Select Retreat Date</label>
                        <select id="retreat-date" name="retreat-date" required>
                            <option value="" disabled selected>Loading available dates...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="pax">Number of Guests</label>
                        <input type="number" id="pax" name="pax" min="1" value="1" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="dietary">Dietary Restrictions or Medical Notes</label>
                        <textarea id="dietary" name="dietary" rows="3"
                            placeholder="Please list any allergies or specific requirements..."></textarea>
                    </div>
                </div>
                <div class="hp-container">
                    <label for="middle_name">Middle Name (Optional)</label>
                    <input type="text" name="middle_name" id="middle_name" autocomplete="off">
                </div>


                <button type="submit" class="submit-btn" id="submitBtn">Proceed to Reservation</button>
            </form>
        </div>
    </div>

    <script src="dates.js"></script>
    <script>
        // REPLACE THIS URL WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6E4roTSvKvDz2nnLoYnY84v7LJMdM1QrUw5ehKisQlTM0lcyZsNLmL66ARdujMiRx/exec';

        document.addEventListener('DOMContentLoaded', () => {
            // 1. Populate dates from dates.js
            if (typeof populateDateDropdown === "function") {
                populateDateDropdown();
            }

            // 2. Handle Mobile Menu Toggle
            const mobileMenu = document.getElementById('mobile-menu');
            const navLinks = document.querySelector('.nav-links');

            if (mobileMenu) {
                mobileMenu.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }

            // 3. Auto-select date if redirected from calendar
            const urlParams = new URLSearchParams(window.location.search);
            const dateId = urlParams.get('date');
            if (dateId) {
                setTimeout(() => {
                    const dateDropdown = document.getElementById('retreat-date');
                    if (dateDropdown) dateDropdown.value = dateId;
                }, 100);
            }
        });

        // Form Submission Logic to Google Sheets
        document.getElementById('registrationForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Processing Reservation...";
            btn.disabled = true;

            // Prepare data for Google Apps Script
            const formData = new FormData(this);

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: new URLSearchParams(formData)
            })
                .then(response => {
                    if (response.ok) {
                        alert("Thank you! Your registration for Langkawi Serenity has been received. Our concierge will contact you shortly.");
                        window.location.href = "index.html";
                    } else {
                        throw new Error('Network error');
                    }
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Something went wrong. Please check your connection and try again.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
        });
    </script>
    <script src="footer.js"></script>
</body>

</html>
